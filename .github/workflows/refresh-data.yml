name: Refresh Windsor Data

on:
  schedule:
    # Setiap 5 jam. Ubah sesuai kebutuhan (format cron, UTC).
    - cron: '0 */3 * * *'
  workflow_dispatch: {}   # tombol "Run workflow" manual di tab Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data dari Windsor.ai
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
        run: node fetch_data.js

      - name: Commit & push data.json jika berubah
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan data, skip commit."
          else
            git commit -m "chore: refresh Windsor data [skip ci]"
            git push
          fi
